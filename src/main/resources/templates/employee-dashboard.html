<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Employee Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f0f2f5; }
        .navbar { background: #2c3e50; }
        .card { border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .badge-pending { background: #f39c12; }
        .badge-approved { background: #27ae60; }
        .badge-rejected { background: #e74c3c; }
    </style>
</head>
<body>
<nav class="navbar navbar-dark px-4 py-3">
    <span class="navbar-brand">Leave Tracker</span>
    <div>
        <span class="text-white me-3">Welcome, <span th:text="${user.name}"></span></span>
        <a href="/logout" class="btn btn-outline-light btn-sm">Logout</a>
    </div>
</nav>

<div class="container mt-4">
    <div class="row">

        <!-- Apply Leave -->
        <div class="col-md-4">
            <div class="card p-4 mb-4">
                <h5 class="mb-3">Apply for Leave</h5>
                <form method="post" action="/employee/apply">
                    <div class="mb-3">
                        <label>Reason</label>
                        <input type="text" name="reason" class="form-control" required/>
                    </div>
                    <div class="mb-3">
                        <label>From Date</label>
                        <input type="date" name="fromDate" class="form-control" required/>
                    </div>
                    <div class="mb-3">
                        <label>To Date</label>
                        <input type="date" name="toDate" class="form-control" required/>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Apply</button>
                </form>
            </div>
        </div>

        <!-- Leave History -->
        <div class="col-md-8">
            <div class="card p-4">
                <h5 class="mb-3">My Leave History</h5>
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th>Reason</th>
                            <th>From</th>
                            <th>To</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="leave : ${leaves}">
                            <td th:text="${leave.reason}"></td>
                            <td th:text="${leave.fromDate}"></td>
                            <td th:text="${leave.toDate}"></td>
                            <td>
                                <span th:classappend="${leave.status == 'PENDING' ? 'badge-pending' : (leave.status == 'APPROVED' ? 'badge-approved' : 'badge-rejected')}"
                                      class="badge text-white" th:text="${leave.status}"></span>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(leaves)}">
                            <td colspan="4" class="text-center text-muted">No leaves applied yet</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>
</div>
</body>
</html>
