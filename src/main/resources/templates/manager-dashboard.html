<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Manager Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f0f2f5; }
        .navbar { background: #2c3e50; }
        .card { border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .badge-pending { background: #f39c12; }
        .badge-approved { background: #27ae60; }
        .badge-rejected { background: #e74c3c; }
    </style>
</head>
<body>
<nav class="navbar navbar-dark px-4 py-3">
    <span class="navbar-brand">Leave Tracker — Manager</span>
    <div>
        <span class="text-white me-3">Welcome, <span th:text="${user.name}"></span></span>
        <a href="/logout" class="btn btn-outline-light btn-sm">Logout</a>
    </div>
</nav>

<div class="container mt-4">

    <!-- Pending Approvals -->
    <div class="card p-4 mb-4">
        <h5 class="mb-3">Pending Approvals</h5>
        <table class="table table-hover">
            <thead>
                <tr>
                    <th>Employee</th>
                    <th>Reason</th>
                    <th>From</th>
                    <th>To</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="leave : ${pendingLeaves}">
                    <td th:text="${leave.user.name}"></td>
                    <td th:text="${leave.reason}"></td>
                    <td th:text="${leave.fromDate}"></td>
                    <td th:text="${leave.toDate}"></td>
                    <td>
                        <form method="post" action="/manager/update" style="display:inline">
                            <input type="hidden" name="leaveId" th:value="${leave.id}"/>
                            <input type="hidden" name="status" value="APPROVED"/>
                            <button type="submit" class="btn btn-success btn-sm">Approve</button>
                        </form>
                        <form method="post" action="/manager/update" style="display:inline">
                            <input type="hidden" name="leaveId" th:value="${leave.id}"/>
                            <input type="hidden" name="status" value="REJECTED"/>
                            <button type="submit" class="btn btn-danger btn-sm">Reject</button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(pendingLeaves)}">
                    <td colspan="5" class="text-center text-muted">No pending leaves</td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- All Leaves -->
    <div class="card p-4">
        <h5 class="mb-3">All Leave Requests</h5>
        <table class="table table-hover">
            <thead>
                <tr>
                    <th>Employee</th>
                    <th>Reason</th>
                    <th>From</th>
                    <th>To</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="leave : ${allLeaves}">
                    <td th:text="${leave.user.name}"></td>
                    <td th:text="${leave.reason}"></td>
                    <td th:text="${leave.fromDate}"></td>
                    <td th:text="${leave.toDate}"></td>
                    <td>
                        <span th:classappend="${leave.status == 'PENDING' ? 'badge-pending' : (leave.status == 'APPROVED' ? 'badge-approved' : 'badge-rejected')}"
                              class="badge text-white" th:text="${leave.status}"></span>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(allLeaves)}">
                    <td colspan="5" class="text-center text-muted">No leave requests yet</td>
                </tr>
            </tbody>
        </table>
    </div>

</div>
</body>
</html>
