<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f0f2f5; }
        .card { margin-top: 100px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .btn-primary { background: #3498db; border: none; }
        h4 { color: #2c3e50; }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-4">
            <div class="card p-4">
                <h4 class="text-center mb-4">Leave Tracker Login</h4>
                <p th:if="${error}" class="text-danger text-center" th:text="${error}"></p>
                <form method="post" action="/login">
                    <div class="mb-3">
                        <label>Email</label>
                        <input type="email" name="email" class="form-control" required/>
                    </div>
                    <div class="mb-3">
                        <label>Password</label>
                        <input type="password" name="password" class="form-control" required/>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Login</button>
                </form>
                <p class="text-center mt-3">No account? <a href="/register">Register</a></p>
            </div>
        </div>
    </div>
</div>
</body>
</html>
